name: Feature request
description: Suggest an idea for this project.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest an improvement.

        Please describe the problem first, then the change you want to see.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: What part of the project does this request affect?
      options:
        - Core ordering
        - Streaming behavior
        - Batch behavior
        - Compatibility or supported usage
        - Performance
        - Documentation
        - Website
        - CI or release workflow
        - Maintenance or release process
        - Developer experience
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What gap, frustration, or risk are you trying to address?
      placeholder: Describe the current problem clearly.
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested change
      description: What would you like to happen instead?
      placeholder: Describe the change as concretely as you can.
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Expected impact
      description: How would this help users, maintainers, or the project?
      placeholder: Explain the outcome you expect if this is implemented.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Add links, screenshots, prior discussion, related roadmap chunk, or compatibility notes if helpful.
    validations:
      required: false

