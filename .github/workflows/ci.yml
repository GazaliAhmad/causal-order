name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
      docs_sync: ${{ steps.filter.outputs.docs_sync }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Detect code changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          base: ${{ github.ref }}
          filters: |
            code:
              - '.github/workflows/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'src/**'
              - 'test/**'
              - 'perf/**'
              - 'examples/**/*.mjs'
            docs_sync:
              - '.github/workflows/**'
              - 'package.json'
              - 'package-lock.json'
              - 'README.md'
              - 'docs/**'
              - 'guides/**'
              - 'wiki/**'
              - 'examples/**'
              - 'src/**'
              - 'website/**'

  test:
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 18
          - 20
          - 24

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  docs-sync:
    needs: changes
    if: ${{ needs.changes.outputs.docs_sync == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run docs synchronization checks
        run: npm run docs:sync:check
