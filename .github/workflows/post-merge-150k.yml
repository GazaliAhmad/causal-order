name: Post-Merge 150k Confidence

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'src/**'
      - 'perf/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: post-merge-150k-${{ github.ref }}
  cancel-in-progress: true

jobs:
  confidence:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20
          - 24

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run 150k batch and stream confidence validation
        run: npm run bench:confidence:150k
