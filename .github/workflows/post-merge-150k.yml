name: Post-Merge 150k Confidence

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: post-merge-150k-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Detect code changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            code:
              - '.github/workflows/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'src/**'
              - 'test/**'
              - 'perf/**'
              - 'examples/**/*.mjs'

  confidence:
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20
          - 24

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run 150k batch and stream confidence validation
        run: npm run bench:confidence:150k
